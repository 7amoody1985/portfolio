# Cloudflare Worker config for the portfolio chatbot.
# Deploy:  npx wrangler secret put ANTHROPIC_API_KEY   (paste key once)
#          npx wrangler secret put TURNSTILE_SECRET    (once Turnstile is set up)
#          npx wrangler deploy
name = "portfolio-chatbot"
main = "src/index.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Per-IP rate limit: 10 requests per 60 seconds.
# (Cloudflare's rate-limiting binding is configured under `unsafe` while in
#  open beta — it works on the free plan.)
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Daily usage counters (global + per-IP) for the cost backstop in index.js.
[[kv_namespaces]]
binding = "USAGE"
id = "4621553fb7b4439fa3dcde1bd2a5b270"
