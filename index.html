<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security hardening (defense-in-depth for a static site) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; img-src 'self' data: https://*.goatcounter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://gc.zgo.at https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://*.goatcounter.com https://portfolio-chatbot.dasouqi.workers.dev http://127.0.0.1:8787 http://localhost:8787; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- Tints the mobile browser chrome; kept in sync with the theme by applyTheme() -->
  <meta name="theme-color" id="meta-theme-color" content="#0a0a0b" />

  <!-- Title/description below are also set from config.js at runtime.
       Edit assets/js/config.js to change the site; these are just fallbacks. -->
  <title>Mohammed Dasouqi Portfolio - AI / ML Engineer</title>
  <meta name="description" content="Portfolio of Mohammed Dasouqi, an AI/ML Engineer building production-grade intelligent systems, including deep learning for medical imaging, NLP pipelines, semantic search, and data-driven backends." id="meta-description" />
  <link rel="canonical" href="https://dasouqi.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mohammed Dasouqi Portfolio - AI / ML Engineer" id="og-title" />
  <meta property="og:description" content="Portfolio of Mohammed Dasouqi, an AI/ML Engineer building production-grade intelligent systems, including deep learning for medical imaging, NLP pipelines, semantic search, and data-driven backends." id="og-description" />
  <meta property="og:url" content="https://dasouqi.com/" />
  <meta property="og:image" content="https://dasouqi.com/assets/img/og.png?v=2" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Mohammed Dasouqi — AI / ML Engineer" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="icon" id="favicon" type="image/svg+xml" href="assets/img/favicon.svg" />

  <!-- config.js must load before the anti-flash script so we know the default theme -->
  <script src="assets/js/config.js?v=4.8"></script>

  <!-- Apply saved (or default) theme before paint to avoid a flash of the wrong theme.
       Legacy values from the old 3-theme system are migrated to light/dark. -->
  <script>
    (function () {
      try {
        var fallback = (typeof CONFIG !== 'undefined' && CONFIG.defaultTheme) || 'light';
        var t = localStorage.getItem('mdtheme');
        if (t === 'professional' || t === 'neural') t = 'dark'; // migrate old themes
        document.documentElement.setAttribute('data-theme', t === 'light' || t === 'dark' ? t : fallback);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="assets/css/style.css?v=4.9" />
</head>
<body>
  <!-- Thin scroll-progress hairline across the very top -->
  <div class="progress" id="progress" aria-hidden="true"></div>

  <!--  Navigation  -->
  <header class="nav" id="nav">
    <a href="#home" class="nav__logo" id="nav-logo" aria-label="Home"></a>
    <nav class="nav__links" id="nav-links" aria-label="Primary">
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#experience">Experience</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="nav__actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Toggle theme">
        <svg class="theme-toggle__sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2"/>
          <path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/>
        </svg>
        <svg class="theme-toggle__moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11z"/>
        </svg>
      </button>
      <button class="nav__burger" id="nav-burger" aria-label="Open menu" aria-expanded="false"><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!--  HERO  -->
    <section class="hero" id="home" aria-label="Introduction">
      <div class="hero__inner" id="hero-inner"><!-- rendered from config --></div>
      <a href="#about" class="hero__scroll" aria-label="Scroll down"><span></span></a>
    </section>

    <!--  Tech marquee strip (items from CONFIG.marquee)  -->
    <div class="marquee" id="marquee" aria-hidden="true"><div class="marquee__track" id="marquee-track"></div></div>

    <!--  ABOUT  -->
    <section class="section" id="about" aria-labelledby="title-about">
      <div class="section__head reveal">
        <span class="section__index">01</span>
        <h2 class="section__title" id="title-about">About</h2>
        <div class="section__rule"></div>
      </div>
      <div class="about" id="about-mount"><!-- rendered from config --></div>
    </section>

    <!--  SKILLS  -->
    <section class="section" id="skills" aria-labelledby="title-skills">
      <div class="section__head reveal">
        <span class="section__index">02</span>
        <h2 class="section__title" id="title-skills">Skills</h2>
        <div class="section__rule"></div>
      </div>
      <div class="skills" id="skills-grid"><!-- rendered from config --></div>
    </section>

    <!--  PROJECTS  -->
    <section class="section" id="projects" aria-labelledby="title-projects">
      <div class="section__head reveal">
        <span class="section__index">03</span>
        <h2 class="section__title" id="title-projects">Projects</h2>
        <div class="section__rule"></div>
      </div>
      <div id="featured-mount"><!-- featured project rendered from config --></div>
      <div class="prows" id="proj-grid"><!-- rendered from config --></div>
    </section>

    <!--  EXPERIENCE  -->
    <section class="section" id="experience" aria-labelledby="title-experience">
      <div class="thread" aria-hidden="true"><span class="thread__joint"></span><i class="thread__fill"></i></div>
      <div class="section__head reveal">
        <span class="section__index">04</span>
        <h2 class="section__title" id="title-experience">Experience</h2>
        <div class="section__rule"></div>
      </div>
      <div class="timeline" id="timeline"><!-- rendered from config --></div>
    </section>

    <!--  CONTACT  -->
    <section class="section section--contact" id="contact" aria-label="Contact">
      <div class="thread thread--end" aria-hidden="true">
        <span class="thread__joint"></span>
        <svg class="thread__svg"><path class="thread__track" d="" /><path class="thread__path" d="" /></svg>
        <span class="thread__dot"></span>
      </div>
      <div class="contact reveal" id="contact-mount"><!-- rendered from config --></div>
    </section>
  </main>

  <footer class="footer">
    <span id="footer-left"></span>
    <span class="footer__built" id="footer-right"></span>
  </footer>

  <!-- Back-to-top -->
  <button class="to-top" id="to-top" aria-label="Back to top" title="Back to top">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="assets/js/brickbreaker.js?v=2.7" defer></script>
  <script src="assets/js/demos.js?v=3.1" defer></script>
  <script src="assets/js/app.js?v=4.9" defer></script>
  <script src="assets/js/chatbot.js?v=1.2" defer></script>
</body>
</html>
