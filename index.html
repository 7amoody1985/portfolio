<!DOCTYPE html>
<html lang="en" data-theme="professional">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security hardening (defense-in-depth for a static site) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; img-src 'self' data: https://*.goatcounter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://gc.zgo.at; connect-src 'self' https://*.goatcounter.com; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- Tints the mobile browser chrome; kept in sync with the theme by applyTheme() -->
  <meta name="theme-color" id="meta-theme-color" content="#0e0f12" />

  <!-- Title/description below are also set from config.js at runtime.
       Edit assets/js/config.js to change the site; these are just fallbacks. -->
  <title>Mohammed Dasouqi Portfolio - AI / ML Engineer</title>
  <meta name="description" content="Portfolio of Mohammed Dasouqi, an AI/ML Engineer building production-grade intelligent systems, including deep learning for medical imaging, NLP pipelines, semantic search, and data-driven backends." id="meta-description" />
  <link rel="canonical" href="https://dasouqi.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mohammed Dasouqi Portfolio - AI / ML Engineer" id="og-title" />
  <meta property="og:description" content="Portfolio of Mohammed Dasouqi, an AI/ML Engineer building production-grade intelligent systems, including deep learning for medical imaging, NLP pipelines, semantic search, and data-driven backends." id="og-description" />
  <meta property="og:url" content="https://dasouqi.com/" />
  <meta property="og:image" content="https://dasouqi.com/assets/img/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Mohammed Dasouqi — AI / ML Engineer" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="icon" id="favicon" type="image/svg+xml" href="assets/img/favicon.svg" />

  <!-- config.js must load before the anti-flash script so we know the default theme -->
  <script src="assets/js/config.js?v=3.4"></script>

  <!-- Apply saved (or default) theme before paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        var valid = ['professional', 'neural', 'light'];
        var fallback = (window.CONFIG && CONFIG.defaultTheme) || 'professional';
        var t = localStorage.getItem('mdtheme');
        document.documentElement.setAttribute('data-theme', valid.indexOf(t) > -1 ? t : fallback);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="assets/css/style.css?v=3.4" />
</head>
<body>
  <!--  Animated neural-network background canvas  -->
  <canvas id="neural-bg" aria-hidden="true"></canvas>

  <!-- Cursor-follow glow (site-wide) -->
  <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

  <!--  Navigation  -->
  <header class="nav" id="nav">
    <a href="#home" class="nav__logo" id="nav-logo" aria-label="Home"></a>
    <nav class="nav__links" aria-label="Primary">
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#experience">Experience</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="nav__actions">
      <button class="kbar-hint" id="open-palette" aria-label="Open command palette">
        <kbd>Ctrl</kbd><kbd>K</kbd>
      </button>
      <div class="theme-menu" id="theme-menu">
        <button class="theme-menu__btn" id="theme-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Choose colour theme">
          <span class="theme-swatch sw-professional" data-sw></span>
          <span class="theme-menu__label" data-label>Graphite Gold</span>
          <svg class="theme-menu__chev" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <ul class="theme-menu__list" id="theme-list" role="listbox" aria-label="Colour theme">
          <li role="option" data-theme-value="light" aria-selected="false"><span class="theme-swatch sw-light"></span>Porcelain</li>
          <li role="option" data-theme-value="professional" aria-selected="true"><span class="theme-swatch sw-professional"></span>Graphite Gold</li>
          <li role="option" data-theme-value="neural" aria-selected="false"><span class="theme-swatch sw-neural"></span>Aurora</li>
        </ul>
      </div>
      <button class="nav__burger" id="nav-burger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!--  HERO  -->
    <section class="hero" id="home" aria-label="Introduction">
      <div class="hero__inner" id="hero-inner"><!-- rendered from config --></div>
      <a href="#about" class="hero__scroll" aria-label="Scroll down"><span></span></a>
    </section>

    <!--  Tech marquee strip (items from CONFIG.marquee)  -->
    <div class="marquee" id="marquee" aria-hidden="true"><div class="marquee__track" id="marquee-track"></div></div>

    <!--  ABOUT  -->
    <section class="section" id="about" aria-labelledby="title-about">
      <div class="section__head reveal">
        <span class="section__index">01</span>
        <h2 class="section__title" id="title-about">About</h2>
        <div class="section__rule"></div>
      </div>
      <div class="about" id="about-mount"><!-- rendered from config --></div>
    </section>

    <!--  SKILLS  -->
    <section class="section" id="skills" aria-labelledby="title-skills">
      <div class="section__head reveal">
        <span class="section__index">02</span>
        <h2 class="section__title" id="title-skills">Skills</h2>
        <div class="section__rule"></div>
      </div>
      <div class="skills" id="skills-grid"><!-- rendered from config --></div>
    </section>

    <!--  PROJECTS  -->
    <section class="section" id="projects" aria-labelledby="title-projects">
      <div class="section__head reveal">
        <span class="section__index">03</span>
        <h2 class="section__title" id="title-projects">Projects</h2>
        <div class="section__rule"></div>
      </div>
      <div id="featured-mount"><!-- featured project rendered from config --></div>
      <div class="proj-grid" id="proj-grid"><!-- rendered from config --></div>
    </section>

    <!--  EXPERIENCE  -->
    <section class="section" id="experience" aria-labelledby="title-experience">
      <div class="section__head reveal">
        <span class="section__index">04</span>
        <h2 class="section__title" id="title-experience">Experience</h2>
        <div class="section__rule"></div>
      </div>
      <div class="timeline" id="timeline"><!-- rendered from config --></div>
    </section>

    <!--  CONTACT  -->
    <section class="section section--contact" id="contact" aria-label="Contact">
      <div class="contact reveal" id="contact-mount"><!-- rendered from config --></div>
    </section>
  </main>

  <footer class="footer">
    <span id="footer-left"></span>
    <span class="footer__built" id="footer-right"></span>
  </footer>

  <!--  Command palette  -->
  <div class="palette" id="palette" role="dialog" aria-modal="true" aria-label="Command palette" hidden>
    <div class="palette__backdrop" data-close></div>
    <div class="palette__box">
      <input type="text" id="palette-input" class="palette__input" placeholder="Type a command or jump to a section…" autocomplete="off" />
      <ul class="palette__list" id="palette-list"></ul>
      <div class="palette__foot"><kbd>↑↓</kbd> navigate <kbd>↵</kbd> select <kbd>esc</kbd> close</div>
    </div>
  </div>

  <!-- Back-to-top button with a circular scroll-progress ring -->
  <button class="to-top" id="to-top" aria-label="Back to top" title="Back to top">
    <svg class="to-top__ring" viewBox="0 0 44 44" aria-hidden="true">
      <circle class="to-top__track" cx="22" cy="22" r="19" />
      <circle class="to-top__bar" cx="22" cy="22" r="19" />
    </svg>
    <span class="to-top__arrow" aria-hidden="true">↑</span>
  </button>

  <script src="assets/js/brickbreaker.js?v=2.7" defer></script>
  <script src="assets/js/demos.js?v=3.1" defer></script>
  <script src="assets/js/app.js?v=3.4" defer></script>
</body>
</html>
